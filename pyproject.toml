[project]
name = "omniscan"
version = "0.1.0"
description = "OmniScan — one-stop application security scanner orchestration platform (SAST/DAST/IAST/RVD)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0.36",
    "aiosqlite>=0.20",
    "asyncpg>=0.30",
    "alembic>=1.13",
    "greenlet>=3.1",
    "typer>=0.13",
    "rich>=13.9",
    "httpx>=0.27",
    "python-multipart>=0.0.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
    "mypy>=1.13",
]
# Note: the RVD "ollama" backend needs no Python dependency — it talks to a local
# Ollama server over plain HTTP (httpx, already a core dep). 100% open source, no key.

[project.scripts]
omniscan = "cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core", "api", "engine", "adapters", "normalize", "workers", "cli", "omniscan_iast"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic revision files are autogenerated — don't lint generated DDL.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]
# B008: FastAPI's Depends()/Query() in argument defaults is the framework idiom.
# ASYNC109: explicit timeout args are intentional in test polling helpers.
ignore = ["B008", "ASYNC109"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
