# OmniScan production-shaped backing services: Postgres, Redis (arq queue),
# MinIO (S3 object store), Vault (secrets). Brings up the infra the prod backends
# expect; run the API + arq worker against it.
#
#   docker compose -f deploy/docker-compose.prod.yml up -d
#   export OMNISCAN_DATABASE_URL=postgresql+asyncpg://omni:omni@localhost:5432/omniscan
#   export OMNISCAN_JOB_BACKEND=arq OMNISCAN_REDIS_URL=redis://localhost:6379/0
#   export OMNISCAN_OBJECT_STORE_URL=s3://omniscan OMNISCAN_S3_ENDPOINT=http://localhost:9000
#   export AWS_ACCESS_KEY_ID=minio AWS_SECRET_ACCESS_KEY=minio123 AWS_REGION=us-east-1
#   export OMNISCAN_SECRETS_BACKEND=vault VAULT_ADDR=http://localhost:8200 VAULT_TOKEN=dev-root
#   uv sync --extra prod && make migrate
#   make api        # API process
#   make worker     # arq worker process (separate terminal)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni
      POSTGRES_DB: omniscan
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]

  # Creates the object-store bucket once MinIO is up.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set m http://minio:9000 minio minio123; do sleep 1; done;
      mc mb -p m/omniscan || true; "

  vault:
    image: hashicorp/vault:1.18
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports: ["8200:8200"]
