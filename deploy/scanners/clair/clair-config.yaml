# Clair v4 combo-mode server config (used by deploy/scanners/clair/docker-compose.yml).
# Minimal dev config — harden (TLS, auth, scaled indexer/matcher/notifier) for prod.
http_listen_addr: ":6060"
introspection_addr: ":8089"
log_level: info

indexer:
  connstring: "host=clair-db port=5432 user=clair password=clair dbname=clair sslmode=disable"
  scanlock_retry: 10
  layer_scan_concurrency: 5
  migrations: true

matcher:
  connstring: "host=clair-db port=5432 user=clair password=clair dbname=clair sslmode=disable"
  max_conn_pool: 100
  migrations: true

matchers:
  names: ~

notifier:
  connstring: "host=clair-db port=5432 user=clair password=clair dbname=clair sslmode=disable"
  migrations: true

# Updaters pull advisory feeds (alpine, debian, ubuntu, rhel, pyupio, ...). First run
# downloads several GB; subsequent runs incrementally refresh on this period.
updaters:
  period: 6h
